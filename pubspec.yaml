name: toddler_logic
description: Local-first cognitive development app for toddlers.
publish_to: 'none'

version: 0.1.0

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  bloc: ^9.0.0
  flutter_bloc: ^9.1.0
  hive: ^2.2.3
  meta: ^1.16.0
  path_provider: ^2.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.11
  hive_generator: ^2.0.1
  lints: ^5.0.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
